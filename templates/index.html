
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Grafos</title>
</head>
<body>
    <h1>Visualizador de Grafos</h1>
    
    <!-- Exibe a imagem do grafo gerada -->
    <img src="/static/graph.png" alt="Visualização do Grafo" width="600">
    
    <hr>
    
    <!-- Formulário para carregar um novo grafo -->
    <h2>Carregar Novo Grafo</h2>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <p>
            Selecione um arquivo de texto para carregar:<br>
            A primeira linha deve conter o número de vértices e arestas.<br>
            As linhas seguintes devem conter as arestas (ex: "1 2").
        </p>
        <input type="file" name="file">
        <input type="submit" value="Carregar">
    </form>
    
    <hr>
    
    <!-- Link para baixar o grafo atual -->
    <h2>Salvar Grafo Atual</h2>
    <p>
        <a href="/download">Clique aqui para baixar o arquivo do grafo atual (graph.txt)</a>
    </p>
</body>
</html>
